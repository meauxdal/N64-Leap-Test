name: Build N64 ROM

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dragonminded/libdragon:latest
    
    env:
      N64_INST: /n64_toolchain

    steps:
      - uses: actions/checkout@v3

      - name: Provision Libdragon
        run: |
          # This ensures the build script and include paths are ready
          git clone --depth 1 https://github.com/DragonMinded/libdragon.git /tmp/libdragon
          cd /tmp/libdragon
          ./build.sh $N64_INST

      - name: Build ROM
        id: build_step
        run: |
          make clean
          make all
          ROM_NAME=$(grep '^PROG_NAME' Makefile | cut -d '=' -f2 | xargs)
          echo "rom_file=${ROM_NAME}.z64" >> $GITHUB_OUTPUT

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: n64-rom-artifact
          path: ${{ steps.build_step.outputs.rom_file }}
